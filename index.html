<!DOCTYPE html>
<html lang="en">
<head>
 <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Loan Tracker">
<link rel="apple-touch-icon" href="icon-192.png"> 
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loan Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="app">

    <header class="header">
      <div>
        <h1>Loan Tracker</h1>
        <p>Track money lent and paid back</p>
      </div>
      <a href="log.html" class="link-btn">View Log</a>
     <a class="link-btn" href="settings.html">⚙️ Settings</a>
    </header>

    <section class="card balance-card">
      <p>Current Balance</p>
      <div id="balance">£0.00</div>

      <div class="stats">
        <div>
          <span>Total Lent</span>
          <strong id="totalLent">£0.00</strong>
        </div>

        <div>
          <span>Total Paid</span>
          <strong id="totalPaid">£0.00</strong>
        </div>
      </div>
    </section>

    <section class="card monthly-card">
      <h2 id="monthTitle">This Month</h2>

      <div class="monthly-grid">
        <div>
          <span>Lent</span>
          <strong id="monthLent">£0.00</strong>
        </div>

        <div>
          <span>Paid</span>
          <strong id="monthPaid">£0.00</strong>
        </div>

        <div>
          <span>Balance</span>
          <strong id="monthBalance">£0.00</strong>
        </div>
      </div>
    </section>

    <section class="card">
    <label>Borrower</label>
<select id="borrowerSelect"></select>
      <label>Amount (£)</label>
      <input id="amount" type="number" placeholder="e.g. 20" />

      <label>Reason</label>
      <input id="reason" type="text" placeholder="Only needed when lending money" />

      <div class="buttons">
        <button id="lendBtn" class="btn-lent">Money Lent</button>
        <button id="paidBtn" class="btn-paid">Money Paid Back</button>
      </div>

      <button id="settleBtn" class="settle-btn">Settle Balance</button>
    </section>

    <section class="card">
      <h2>Recent Activity</h2>
      <div id="recentList"></div>
    </section>

 <a href="settings.html" class="card backup-status-card">
  <span>Backup Status</span>
  <strong id="lastBackup">⚪ Never backed up</strong>
</a>

 


  </div>

  <script src="data.js"></script>
  <script src="script.js"></script>
 <script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("./service-worker.js");
    });
  }
</script>
</body>
</html>
